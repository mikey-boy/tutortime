{% extends "base.html" %}

{% block title %}Update service{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-box">
        <h2>Update an existing service</h2>
        <form action="{{ url_for('user_service_update', service_id=service['id']) }}" method="POST">
            <label for="title">Title:</label>
            <input type="text" name="title" value="{{ service['title'] }}" required>
            <label for="description">Description:</label>
            <input type="text" name="description" value="{{ service['description'] }}" required>
            <button type="submit" id="signup">Update service</button>
            <p class="error-text">{{ failure_msg }}</p>
        </form>
    </div>
</div>
{% endblock %}
