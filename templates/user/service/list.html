{% extends "home.html" %}

{% block content %}
    {% if session.get("username", None) != None %}
        <table id="user-service-nav">
            <thead>
                <tr>
                    <th><h4><a class="user-service-status" href="{{ url_for('user_service_list', status='active')}}">Active</a></h4></th>
                    <th><h4><a class="user-service-status" href="{{ url_for('user_service_list', status='draft')}}">Draft</a></h4></th>
                    <th><h4><a class="user-service-status" href="{{ url_for('user_service_list', status='paused')}}">Paused</a></h4></th>
                    <th><a href="{{ url_for('user_service_create')}}"><button id="create-service">New service</button></a></th>
                </tr>
            </thead>
        </table>
        <table id="user-service-table">
            <thead>
                <th>Title</th>
                <th>Description</th>
                <th></th>
            </thead>
            <tbody></tbody>
        </table>
    {% else %}
        <p><a href="{{ url_for('user_account_login') }}">Login</a> or <a href="{{ url_for('user_account_create') }}">create an account</a> to start giving lessons on the site</p>
    {% endif %}
{% endblock %}
